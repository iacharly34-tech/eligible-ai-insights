# Touched on 2026-05-24 to force Railway auto-deploy after a docs-only commit was ignored.
[build]
builder = "DOCKERFILE"
dockerfilePath = "linkedin-bot/Dockerfile"
watchPatterns = ["linkedin-bot/**", "railway.toml"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 10
numReplicas = 1
